services:
  # 1. Backend Web Service
  - type: web
    name: gravityx-api
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: gravityx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # 2. Frontend Web Service
  - type: web
    name: gravityx-web
    env: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gravityx-api.onrender.com
# 3. Managed Database Instance
databases:
  - name: gravityx-db
