services:
  # 1. Backend Web Service
  - type: web
    name: gravityx-api
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: gravityx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # 2. Frontend Web Service
  - type: web
    name: gravityx-web
    env: docker
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: gravityx-api
          property: host

# 3. Managed Database Instance
databases:
  - name: gravityx-db
    plan: free
    databaseName: gravityx_prod
    user: gravityx
